 nhau, bao gồm cả đất nông nghiệp. Những đặc điểm thích nghi của wallaby cổ đỏ bao gồm bộ lông màu đỏ hung trên gáy và vai, là nguồn gốc của tên gọi của chúng. Chúng có khứu giác và thính giác nhạy bén, với đôi tai lớn có thể cử động độc lập lên đến 180 độ, giúp chúng luôn cảnh giác trước những kẻ săn mồi tiềm năng như chó Dingo. Tiếp theo là Wallaby đầm lầy, tên khoa học là *Wallabia bicolor*. Tình trạng bảo tồn của chúng cũng là ít quan tâm nhất. Bạn có biết không? Wallaby đầm lầy là loài ăn thực vật, chủ yếu ăn các loại thực vật mềm như cỏ, lá, cây bụi, chồi, dương xỉ và đôi khi cả vỏ cây. Điều thú vị là chúng có thể ăn các loại cây như dương xỉ và hemlock, vốn độc hại đối với các loài động vật Úc khác. Về hành vi, wallaby đầm lầy hoạt động chủ yếu từ hoàng hôn đến bình minh. Chúng thường là những sinh vật đơn độc, mặc dù có thể tập trung lại để kiếm ăn vào buổi tối. Người ta đã quan sát thấy chúng kiếm ăn cùng với các loài không liên quan mà không thể hiện hành vi lãnh thổ. Môi trường sống của chúng là đặc hữu của các khu rừng rậm, rừng cây và đầm lầy dọc theo bờ biển phía đông của Úc, từ phía đông Nam Úc đến Queensland. Wallaby đầm lầy có thể sống trong nhiều môi trường khác nhau. Là loài duy nhất còn sống sót trong chi *Wallabia*, loài thú có túi nhỏ này được tô điểm bằng bộ lông màu nâu sẫm, với những vệt màu gỉ sét nhạt hơn ở bụng, ngực và gốc tai. Chúng tự làm mát bằng cách liếm tay và cẳng tay trong những khoảnh khắc phấn khích hoặc khi thời tiết nóng.\n[FQ: Wallaby cổ đỏ và wallaby đầm lầy có đặc điểm chung nào về tập tính xã hội? | Chế độ ăn của wallaby đầm lầy giúp chúng thích nghi với môi trường như thế nào? | Có loài wallaby nào khác đang đối mặt với nguy cơ tuyệt chủng cao hơn không?]","model":"gemini-2.5-flash","voice":"supertonic:M4","mode":"text","thumbnail":"images/2026/06/20/631_thumb.jpg","imageUrl":"images/2026/06/20/631_img.jpg","preview":"Chào bạn, hôm nay chúng ta sẽ cùng tìm hiểu về hai loài thú có túi rất đặc biệt của Úc, đó là Wallaby cổ 2026/06/20/638_thumb.jpg","imageUrl":"images/2026/06/20/638_img.jpg","preview":"Sinh vật khổng lồ đang trườn trên cát này dường như là một con trăn Miến Điện, một trong những loài trăn lớn nhất thế giới. Tại Công viên Động vật hoang dã Symbio, bạn đang được chiêm ngưỡng một sát thủ siết mồi thực thụ với hoa văn da đặc trưng giúp nó ngụy trang hoàn hảo trong môi trường tự nhiên."},{"id":639,"date":"2026-06-20","timestamp":"2026-06-20T03:35:05.858Z","location":{"suburb":null,"district":"Helensburgh","city":"Helensburgh","state":"New South Wales","country":"Úc","postcode":"2508","pois":[],"balance_estimate":99.617321},"transcript":"Chào bạn, hôm nay chúng ta sẽ cùng tìm hiểu về loài Wombat thông thường, một loài vật đáng yêu với nhiều đặc điểm thú vị. Tên khoa học của chúng là *Vombatus ursinus* và hiện tại, tình trạng bảo tồn của chúng được xếp vào mức \"Ít quan tâm\" (Least concern). Bạn có biết không? Chế độ ăn của wombat bao gồm các loại cỏ bản địa thô, cói, bấc, rễ cây mọng nước, củ và cỏ đồng cỏ. Chúng chủ yếu hoạt động về đêm, thường ra ngoài kiếm ăn khi nhiệt độ thấp hơn. Về hành vi xã hội, wombat chủ yếu là loài động vật sống đơn độc. Tuy nhiên, đôi khi các khu vực sinh sống của chúng có thể chồng lấn lên nhau, dẫn đến việc nhiều wombat cùng sử dụng một hang. Môi trường sống của wombat thông thường rất đa dạng, trải dài khắp Tasmania và các khu rừng ven biển phía đông nam Australia, các khu rừng núi cao và đồng cỏ. Chúng có những khả năng thích nghi độc đáo. Wombat là loài sống về đêm và sống dưới lòng đất vào ban ngày. Điều này giúp chúng tránh được kẻ săn mồi và cung cấp một lớp bảo vệ trong trường hợp cháy rừng. Chúng có túi hướng về phía sau, nhờ đó khi đào hang, đất sẽ không lấp đầy túi. Và một điều đặc biệt nữa là phân của chúng có hình khối lập phương. Người ta tin rằng đây là một sự thích nghi giúp chúng đánh dấu lãnh thổ mà không bị lăn khỏi các khúc gỗ hay đá. Tất cả những thông tin này được cung cấp bởi Công viên động vật hoang dã Symbio.\n[FQ: Tại atus*. Tình trạng bảo tồn của chúng hiện là \"ít quan tâm\". Bạn có biết không? *   Echidna là những kỹ sư hệ sinh thái, chúng di chuyển trung bình 200 mét khối đất mỗi năm. *   Chúng có rất ít tuyến mồ hôi, vì vậy trong điều kiện nhiệt độ cao mà không tìm được nơi trú ẩn, chúng có thể bị sốc nhiệt. Ngược lại, nếu nhiệt độ xuống quá thấp, chúng sẽ rơi vào trạng thái ngủ đông hoặc ngủ hè để bảo tồn năng lượng. *   Echidna không có răng, chúng chỉ có hai bộ miếng đệm keratin hóa cứng trên vòm miệng và phía sau lưỡi để nghiền thức ăn. *   Echidna cũng là những vận động viên bơi lội đáng kinh ngạc! Thông tin này được cung cấp bởi Công viên Động vật Hoang dã Symbio, nằm ở Helensburgh, New South Wales, Úc.\n\nEchidna mỏ ngắn là một trong những loài động vật có vú đẻ trứng duy nhất trên thế giới, cùng với thú mỏ vịt. Chúng là loài bản địa của Úc và New Guinea. Khả năng di chuyển đất của chúng có vai trò quan trọng trong việc cải thiện chất lượng đất và phân tán hạt giống, giúp duy trì sự đa dạng sinh học của hệ sinh thái. Việc chúng có thể ngủ đông hoặc ngủ hè là một cơ chế thích nghi tuyệt vời để đối phó với sự thay đổi khắc nghiệt của môi trường sống, đặc biệt là ở Úc với khí hậu đa dạng.\n[FQ: Echidna mỏ ngắn đẻ trứng như thế nào? | Chế độ ăn của Echidna mỏ ngắn gồm những gì? | Echidna mỏ ngắn có những kẻ thù tự nhiên nào?]","model":"gemini-2.5-flash","voice":"supertonic:M4","mode":"text","thumbnail":"images/2026/06/20/640_thumb.jpg","imageUrl":"images/2026/06/20/640_img.jpg","preview":"Đây là thông tin về loài Echidna mỏ ngắn, tên khoa học là *Tachyglossus aculeatus*. Tình trạng bảo tồn của chúng hiện là \"ít quan tâm\". Bạn có biết không? *   Echidna là những kỹ sư hệ sinh thái, chúng di chuyển trung bình 200 mét khối đất mỗi năm. *   Chúng có rất ít tuyến mồ hôi, vì vậy trong điều kiện nhiệt độ cao mà không tìm được nơi trú ẩn, chúng có thể bị sốc nhiệt. Ngược lại, nếu nhiệt độ xuống quá thấp, chúng sẽ rơi vào trạng thái ngủ đông hoặc ngủ hè để bảo tồn năng lượng. *  chọn khi tìm thấy các loài động vật nhỏ khác như thằn lằn, rắn, bọ cạp, nhện, rết, chim, và thậm chí cả thực vật, trứng. Điều thú vị là chúng có khả năng miễn dịch một phần với nọc độc của bọ cạp và rắn, giúp chúng an toàn hơn khi săn mồi.\n[FQ: Meerkat sống theo bầy đàn như thế nào? | Meerkat giao tiếp với nhau bằng cách nào? | Meerkat có kẻ thù tự nhiên nào không?]\n\n---\n\nQ: Meerkat có tập tính xã hội độc đáo nào khác ngoài việc đào bới không?\n\n---\n\nNgoài khả năng đào bới xuất sắc, Meerkat còn nổi tiếng với tập tính xã hội vô cùng độc đáo và phức tạp. Chúng sống thành đàn lớn, thường có từ 20 đến 50 cá thể, và mỗi đàn có một cấu trúc xã hội rất rõ ràng, được dẫn dắt bởi một cặp đôi thống trị. Một trong những tập tính nổi bật nhất là việc chúng thay phiên nhau làm \"lính gác\". Trong khi cả đàn đi tìm kiếm thức ăn, sẽ có một hoặc vài con Meerkat đứng thẳng trên hai chân sau, cảnh giác quan sát xung quanh để phát hiện kẻ thù săn mồi như chim săn mồi hoặc rắn. Nếu phát hiện nguy hiểm, chúng sẽ phát ra tiếng kêu báo động đặc trưng để cả đàn nhanh chóng tìm nơi ẩn náu. Chúng cũng rất chăm sóc con non. Các con Meerkat trưởng thành không có con vẫn sẽ giúp đỡ cặp đôi thống trị nuôi dưỡng và bảo vệ con non của đàn. Chúng dạy dỗ con non cách tìm kiếm thức ăn, cách nhận biết nguy hiểm và các kỹ năng sống sót khác. Một tập tính thú vị khác là \"tắm nắng\". Meerkat thường nằm ngửa hoặc ngồi thẳng đứng, phơi bụng dưới ánh nắng mặt trời vào buổi sáng để làm ấm cơ thể sau đêm lạnh giá ở sa mạc. Đây cũng là thời gian chúng tương tác xã hội, chải lông cho nhau, tăng cường gắn kết trong đàn. Tất cả những tập tính này cho thấy Meerkat là loài vật có tổ chức xã hội cao, luôn hợp tác để sinh tồn và phát triển trong môi trường khắc nghiệt của sa mạc.\n[FQ: Meerkat phân biệt các loại kẻ thù săn mồi như thế nào? | Có bằng chứng nào cho thấy Meerkat có khả năng học hỏi từ kinh nghiệm không? | Tập tính \"tắm nắng\" của Meerkat có lợi ích gì khác ngoài việc làm ấm cơ thể?]","model": Đây là một tấm biển thông tin về loài Koala, với tên khoa học là *Phascolarctos cinereus*. Tình trạng bảo tồn của chúng hiện đang bị đe dọa. Bạn có biết không? Koala ngủ từ 18 đến 22 giờ mỗi ngày, đó là do chế độ ăn ít dinh dưỡng của chúng, chủ yếu là lá bạch đàn, giúp chúng tiết kiệm năng lượng. Koala con, hay còn gọi là joey, khi sinh ra chỉ nhỏ bằng hạt đậu và tự mình bò vào túi của mẹ. Chúng ở trong túi mẹ đến 7 tháng cho đến khi đủ khỏe để chui ra ngoài. Tên gọi \"Koala\" được cho là xuất phát từ một thuật ngữ thổ dân có nghĩa là \"không uống\". Điều này là bởi vì Koala hấp thụ gần như toàn bộ độ ẩm cần thiết từ lá cây mà chúng ăn, và hiếm khi uống nước. Mất môi trường sống là mối đe dọa lớn nhất đối với biểu tượng tuyệt vời này của Úc. Tấm biển này được cung cấp bởi Symbio Wildlife Park. Trong hình ảnh thứ hai, chúng ta có thể thấy một chú Koala đang ngủ trên cây, ẩn mình giữa những tán lá xanh rậm rạp. Chú Koala này có bộ lông màu xám đặc trưng, đang cuộn tròn trên cành cây, cho thấy thói quen ngủ nhiều của loài vật này. Môi trường xung quanh là những cành cây với lá nhỏ, xanh tươi, tạo nên một khung cảnh tự nhiên và yên bình. Koala là loài thú có túi đặc hữu của Úc, nổi tiếng với vẻ ngoài đáng yêu và lối sống chậm rãi. Chúng là loài ăn lá bạch đàn chuyên biệt, và hệ tiêu hóa của chúng đã thích nghi để xử lý loại lá này, vốn có độc tố đối với hầu hết các loài động vật khác. Tuy nhiên, lá bạch đàn cũng có hàm lượng dinh dưỡng thấp, đó là lý do tại sao Koala cần ngủ rất nhiều để bảo tồn năng lượng. Sự mất mát môi trường sống do phá rừng và cháy rừng là một trong những nguyên nhân chính khiến số lượng Koala suy giảm nghiêm trọng, đẩy chúng vào danh sách các loài bị đe dọa. Các công viên động vật hoang dã như Symbio Wildlife Park đóng vai trò quan trọng trong việc bảo tồn và nâng cao nhận thức về loài vật độc đáo này.\n[FQ: Koala có thể sống sót bao lâu nếu không có lá bạch đàn? | Các biện pháp bảo tồn nào đang được áp dụng để bảo vệ Koala? | Ngoài mất môi trường         el.appendChild(img);
      }
      var info=document.createElement('div'); info.className='item-info';
      var metaEl=document.createElement('p'); metaEl.className='item-meta';
      metaEl.textContent=timeStr || r.date; info.appendChild(metaEl);
      if (r.location) {
        var pts=[];
        if (r.location.suburb)   pts.push(r.location.suburb);
        if (r.location.district) pts.push(r.location.district);
        if (r.location.city)     pts.push(r.location.city);
        if (r.location.state)    pts.push(r.location.state);
        if (r.location.country)  pts.push(r.location.country);
        var loc=document.createElement('p'); loc.className='item-loc';
        loc.textContent=pts.length ? pts.join(', ') : ' ';
        info.appendChild(loc);
      } else {
        var loc=document.createElement('p'); loc.className='item-loc';
        loc.innerHTML='&nbsp;'; info.appendChild(loc);
      }
      if (r.preview) { var prev=document.createElement('p'); prev.className='item-preview'; prev.textContent=r.preview; info.appendChild(prev); }
      el.appendChild(info);
      el.addEventListener('click', function(){ history.pushState({ aiOpen: true }, ''); openAI(r); });
      listEl.appendChild(el);
    });
  }

  if (allDates.length) {
    var _last=allDates[allDates.length-1];
    _selYear=_last.slice(0,4); _selMonth=_last.slice(5,7); _selDay=_last.slice(8,10);
    _renderFilter(); renderList(_last);
  }
  else { listEl.innerHTML='<p class="no-items">No data in this export.</p>'; }

  function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function md2html(text){
    return escHtml(text)
      .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
      .replace(/\n/g,'<br>');
  }
  function makeBubbleAI(text) {
    var fqIdx=text.indexOf('[FQ:');
    var main=(fqIdx !== -1 ? text.slice(0,fqIdx) : text).trimEnd();
    var div=document.createElement('div'); div.className='bubble-ai'; div.innerHTML=md2html(main);
    return div;
  }

  function openAI(r) {
    var photoWrap=document.getElementById('ai-photo-wrap');
    var turns=document.getElementById('chat-turns');
    photoWrap.innerHTML=''; turns.innerHTML='';
    if (r.imageUrl) {
      var imgFrame=document.createElement('div');
      imgFrame.style.cssText='display:flex;flex-direction:column;align-items:center;padding:32px 16px 20px;position:relative;animation:tmZoomIn 0.7s ease-out;';
      var _glow1=document.createElement('div');
      _glow1.style.cssText='position:absolute;inset:0;background:rgba(37,99,235,0.12);filter:blur(40px);border-radius:50%;pointer-events:none;';
      var _glow2=document.createElement('div');
      _glow2.style.cssText='position:absolute;inset:0;background:linear-gradient(135deg,#3b82f6,#22d3ee,#a855f7);filter:blur(12px);opacity:0.22;pointer-events:none;transition:opacity 0.3s;';
      var _pw=document.createElement('div'); _pw.style.cssText='position:relative;width:80%;';
      var _glass=document.createElement('div');
      _glass.style.cssText='position:absolute;inset:-1px;background:linear-gradient(to bottom,rgba(255,255,255,0.25),transparent);border-radius:6px;z-index:2;pointer-events:none;';
      var imgEl=document.createElement('img'); imgEl.alt='';
      imgEl.style.cssText='max-width:100%;max-height:calc(80vh - 140px);width:auto;height:auto;border-radius:6px;display:block;position:relative;z-index:1;transition:transform 0.5s;box-shadow:0 30px 60px -12px rgba(0,0,0,0.9),0 0 60px -10px rgba(59,130,246,0.45);transform:perspective(1200px) rotateX(4deg);';
      imgEl.onerror = function() { photoWrap.innerHTML = ''; };
      imgEl.src=r.imageUrl;
      var _sw=document.createElement('div');
      _sw.style.cssText='position:absolute;inset:0;border-radius:6px;overflow:hidden;z-index:3;pointer-events:none;';
      var _sweep=document.createElement('div');
      _sweep.style.cssText='position:absolute;inset:0;background:linear-gradient(to right,transparent,rgba(255,255,255,0.07),transparent);transform:translateX(-100%);transition:transform 1s;';
      _sw.appendChild(_sweep); _pw.appendChild(_glass); _pw.appendChild(imgEl); _pw.appendChild(_sw);
      imgFrame.appendChild(_glow1); imgFrame.appendChild(_glow2); imgFrame.appendChild(_pw);
      var _onEnter=function(){ _glow2.style.opacity='0.4'; imgEl.style.transform='perspective(1200px) rotateX(4deg) scale(1.02)'; _sweep.style.transform='translateX(100%)'; };
      var _onLeave=function(){ _glow2.style.opacity='0.22'; imgEl.style.transform='perspective(1200px) rotateX(4deg)'; _sweep.style.transform='translateX(-100%)'; };
      imgFrame.addEventListener('mouseenter',_onEnter);
      imgFrame.addEventListener('mouseleave',_onLeave);
      imgFrame.addEventListener('touchstart',_onEnter,{passive:true});
      imgFrame.addEventListener('touchend',function(){ setTimeout(_onLeave,800); },{passive:true});
      photoWrap.appendChild(imgFrame);
    }
    var parts=(r.transcript||'').split('\n\n-- Bos --\n\n'); // wait, \n\n---\n\n
    var actualParts = (r.transcript||'').split('\n\n---\n\n');
    actualParts.forEach(function(p){
      if (!p.trim()) return;
      if (p.startsWith('Q: ')) { var b=document.createElement('div'); b.className='bubble-user'; b.textContent=p.slice(3); turns.appendChild(b); }
      else { turns.appendChild(makeBubbleAI(p)); }
    });
    document.getElementById('screen-list').style.display='none';
    document.getElementById('screen-ai').style.display='flex';
    document.getElementById('ai-text-col').scrollTop=0;
  }

  function closeAI() {
    document.getElementById('screen-ai').style.display='none';
    document.getElementById('screen-list').style.display='flex';
  }
  document.getElementById('btn-ai-close').addEventListener('click', closeAI);

  document.addEventListener('keydown', function(e){ if (e.key==='Escape') closeAI(); });

  window.addEventListener('popstate', function(){
    if (document.getElementById('screen-ai').style.display!=='none') closeAI();
  });

  var _tsX = null;
  document.addEventListener('touchstart', function(e){
    _tsX = e.touches[0] ? e.touches[0].clientX : null;
  }, { passive: true });
  document.addEventListener('touchend', function(e){
    if (_tsX === null) return;
    var dx = (e.changedTouches[0] ? e.changedTouches[0].clientX : 0) - _tsX;
    if (dx > 80 && _tsX < 40) closeAI();
    _tsX = null;
  }, { passive: true });
})();
</script>
</body>
</html>
